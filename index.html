// ── Supabase helpers ──────────────────────────────────────
const sbHeaders = (token) => ({
  "Content-Type": "application/json",
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${token || SUPABASE_ANON_KEY}`,
  "Prefer": "return=representation"
});

const signInWithGoogle = () => {
  window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.href.split('#')[0])}`;
};

const getSession = async () => {
  const hash = window.location.hash;
  if (hash) {
    const p = new URLSearchParams(hash.substring(1));
    const at = p.get("access_token"), rt = p.get("refresh_token");
    if (at) {
      localStorage.setItem("sb_access_token", at);
      if (rt) localStorage.setItem("sb_refresh_token", rt);
      window.history.replaceState({}, document.title, window.location.pathname);
      return at;
    }
  }
  return localStorage.getItem("sb_access_token");
};

const signOut = () => {
  localStorage.removeItem("sb_access_token");
  localStorage.removeItem("sb_refresh_token");
  window.location.reload();
};

const dbFetch = async (path, token, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: sbHeaders(token), ...options });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
};

const getUserId = async (token) => {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, { headers: sbHeaders(token) });
  const data = await res.json();
  return data.id;
};

// ── File text extraction ──────────────────────────────────
const extractText = async (file) => {
  if (file.name.endsWith(".pdf") || file.type === "application/pdf") {
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(x => x.str).join(" ") + "\n";
    }
    return text;
  } else if (file.name.endsWith(".docx")) {
    const ab = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: ab });
    return result.value;
  } else {
    return await file.text();
  }
};

// ── AI resume parser ──────────────────────────────────────
const parseResumeWithAI = async (text) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": getAnthropicKey(),
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: `Parse this resume and return ONLY a valid JSON object, no markdown, no backticks:
{"first_name":"","last_name":"","email":"","phone":"","location":"","linkedin_url":"","candidate_type":"emr","emr_systems":[],"skills":"","current_title":"","current_company":"","years_experience":0,"target_roles":"","travel_willing":false,"notes":""}
candidate_type: "emr" if EMR/EHR trainer or consultant, else "it_leadership"
emr_systems: only from: eCW,athena,ModMed,NextGen,Experity,Epic,Cerner,Meditech,Allscripts,PointClickCare
skills: comma-separated string
notes: 1-2 sentence summary
Resume:
${text.substring(0, 3000)}` }]
    })
  });
  const data = await res.json();
  const clean = data.content[0].text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
};

// ── ICP scorer ────────────────────────────────────────────
const scoreCandidate = (candidate, icp) => {
  if (!icp) return null;
  let score = 0, max = 0;
  if (icp.required_emr_systems?.length > 0 && candidate.emr_systems?.length > 0) {
    max += 40;
    score += (icp.required_emr_systems.filter(e => candidate.emr_systems?.includes(e)).length / icp.required_emr_systems.length) * 40;
  }
  if (icp.required_skills?.length > 0 && candidate.skills) {
    max += 30;
    score += (icp.required_skills.filter(s => candidate.skills?.toLowerCase().includes(s.toLowerCase())).length / icp.required_skills.length) * 30;
  }
  if (icp.min_years_experience && candidate.years_experience) {
    max += 20;
    if (candidate.years_experience >= icp.min_years_experience) score += 20;
    else if (candidate.years_experience >= icp.min_years_experience - 2) score += 10;
  }
  if (icp.travel_required && candidate.travel_willing) { max += 10; score += 10; }
  return max > 0 ? Math.round((score / max) * 100) : null;
};

// ── UI components ─────────────────────────────────────────
const Badge = ({ children, color="accent", size="sm" }) => {
  const m = {
    accent:{bg:C.accentSoft,text:C.accent}, emr:{bg:C.emrSoft,text:"#A78BFA"},
    it:{bg:C.itSoft,text:"#22D3EE"}, success:{bg:"rgba(34,197,94,0.12)",text:C.success},
    warning:{bg:"rgba(245,158,11,0.12)",text:C.warning}, danger:{bg:"rgba(239,68,68,0.12)",text:C.danger},
    muted:{bg:"rgba(139,144,168,0.12)",text:C.textSecondary}
  };
  const c = m[color] || m.accent;
  return <span style={{background:c.bg,color:c.text,padding:size==="sm"?"2px 8px":"4px 12px",borderRadius:20,fontSize:size==="sm"?11:12,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
};

const Btn = ({ children, onClick, variant="primary", size="md", disabled, style:s={} }) => {
  const v = {
    primary:{background:C.accent,color:"#fff",border:"none"},
    secondary:{background:C.surface,color:C.textPrimary,border:`1px solid ${C.border}`},
    ghost:{background:"transparent",color:C.textSecondary,border:"none"},
    danger:{background:"rgba(239,68,68,0.1)",color:C.danger,border:"1px solid rgba(239,68,68,0.3)"}
  };
  const sz = {sm:{padding:"6px 12px",fontSize:12},md:{padding:"8px 16px",fontSize:13},lg:{padding:"12px 24px",fontSize:14}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],...sz[size],borderRadius:8,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...s}}>{children}</button>;
};

const Field = ({ label, value, onChange, placeholder, type="text", required }) => (
  <div style={{marginBottom:16}}>

    <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}/>

const Sel = ({ label, value, onChange, options }) => (

    <select value={value||""} onChange={e=>onChange(e.target.value)}

const ScoreBadge = ({ score }) => {
  if (score === null || score === undefined) return <Badge color="muted">No ICP</Badge>;
  return <Badge color={score>=75?"success":score>=50?"warning":"danger"}>{score}% match</Badge>;
};

        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>

// ── Candidate Form ────────────────────────────────────────
const CandidateForm = ({ candidate, onSave, onCancel }) => {
  const [form, setForm] = useState(candidate || {
    candidate_type:"emr",first_name:"",last_name:"",email:"",phone:"",location:"",
    linkedin_url:"",current_title:"",current_company:"",years_experience:"",
    emr_systems:[],skills:"",target_roles:"",comp_min:"",comp_max:"",
    travel_willing:false,available_date:"",active_status:"active",notes:"",last_contacted:""
  });
  const [parsing, setParsing] = useState(false);
  const [parseMsg, setParseMsg] = useState("");
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const toggleEMR = (emr) => {
    const c = form.emr_systems || [];
    set("emr_systems", c.includes(emr) ? c.filter(e=>e!==emr) : [...c, emr]);
  };

  const handleResume = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setParsing(true); setParseMsg("");
    try {
      const text = await extractText(file);
      if (!text || text.trim().length < 50) throw new Error("No text");
      const parsed = await parseResumeWithAI(text);
      setForm(f => ({...f, ...parsed,
        emr_systems: Array.isArray(parsed.emr_systems) ? parsed.emr_systems : [],
        skills: Array.isArray(parsed.skills) ? parsed.skills.join(", ") : parsed.skills || ""
      }));
      setParseMsg("✓ Resume parsed successfully");
    } catch(err) {
      setParseMsg("Could not parse resume — please fill in manually");
    }
    setParsing(false);
  };

  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <h2 style={{fontSize:18,fontWeight:700}}>{candidate?.id ? "Edit Candidate" : "Add Candidate"}</h2>
        <Btn variant="ghost" onClick={onCancel}>✕ Cancel</Btn>
      </div>

      <div style={{background:C.accentSoft,border:`1px dashed ${C.accent}`,borderRadius:10,padding:20,marginBottom:24,textAlign:"center"}}>
        <div style={{fontSize:13,color:C.accent,fontWeight:600,marginBottom:6}}>⚡ AI Resume Parser</div>
        <div style={{fontSize:12,color:C.textSecondary,marginBottom:12}}>Upload a resume (.pdf, .docx, .txt) and AI will auto-fill the form</div>
        <label style={{cursor:"pointer",display:"inline-block"}}>
          <span style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,color:C.textPrimary,display:"inline-block"}}>
            {parsing ? "Parsing..." : "Upload Resume"}
          </span>
          <input type="file" accept=".pdf,.docx,.txt" onChange={handleResume} style={{display:"none"}} disabled={parsing}/>
        </label>
        {parseMsg && <div style={{fontSize:12,marginTop:8,color:parseMsg.startsWith("✓")?C.success:C.danger}}>{parseMsg}</div>}
      </div>

      <div style={{display:"flex",gap:12,marginBottom:20}}>
        {[{v:"emr",label:"EMR Project",color:"#7C3AED"},{v:"it_leadership",label:"IT / Leadership",color:"#0891B2"}].map(t=>(
          <button key={t.v} onClick={()=>set("candidate_type",t.v)} style={{flex:1,padding:12,borderRadius:10,border:`2px solid ${form.candidate_type===t.v?t.color:C.border}`,background:form.candidate_type===t.v?`${t.color}20`:C.surface,color:form.candidate_type===t.v?t.color:C.textSecondary,fontWeight:600,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <Field label="First Name" value={form.first_name} onChange={v=>set("first_name",v)} required/>
        <Field label="Last Name" value={form.last_name} onChange={v=>set("last_name",v)} required/>
        <Field label="Email" value={form.email} onChange={v=>set("email",v)} type="email"/>
        <Field label="Phone" value={form.phone} onChange={v=>set("phone",v)}/>
        <Field label="Location" value={form.location} onChange={v=>set("location",v)} placeholder="City, State"/>
        <Field label="LinkedIn URL" value={form.linkedin_url} onChange={v=>set("linkedin_url",v)}/>
        <Field label="Current Title" value={form.current_title} onChange={v=>set("current_title",v)}/>
        <Field label="Current Company" value={form.current_company} onChange={v=>set("current_company",v)}/>
        <Field label="Years Experience" value={form.years_experience} onChange={v=>set("years_experience",v)} type="number"/>
        <Sel label="Status" value={form.active_status} onChange={v=>set("active_status",v)} options={[
          {value:"active",label:"Active — Looking"},{value:"passive",label:"Passive — Open"},
          {value:"placed",label:"Placed / Unavailable"},{value:"do_not_contact",label:"Do Not Contact"}
        ]}/>
      </div>

      {form.candidate_type==="emr" && (
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>EMR Proficiencies</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {EMR_SYSTEMS.map(emr=>(
              <button key={emr} onClick={()=>toggleEMR(emr)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:`1px solid ${(form.emr_systems||[]).includes(emr)?"#A78BFA":C.border}`,background:(form.emr_systems||[]).includes(emr)?C.emrSoft:C.surface,color:(form.emr_systems||[]).includes(emr)?"#A78BFA":C.textSecondary}}>{emr}</button>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <Field label="Available Date" value={form.available_date} onChange={v=>set("available_date",v)} type="date"/>
        <Field label="Last Contacted" value={form.last_contacted} onChange={v=>set("last_contacted",v)} type="date"/>
        <Field label="Pay Min ($/hr or salary)" value={form.comp_min} onChange={v=>set("comp_min",v)}/>
        <Field label="Pay Max ($/hr or salary)" value={form.comp_max} onChange={v=>set("comp_max",v)}/>
      </div>

      <Field label="Skills / Tech Stack" value={form.skills} onChange={v=>set("skills",v)} placeholder="Comma separated: Epic, SQL, Python..."/>
      <Field label="Target Roles / Seniority" value={form.target_roles} onChange={v=>set("target_roles",v)} placeholder="e.g. IT Project Manager, Director of IT..."/>

      <div style={{marginBottom:16}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13}}>
          <input type="checkbox" checked={form.travel_willing||false} onChange={e=>set("travel_willing",e.target.checked)} style={{width:16,height:16,accentColor:C.accent}}/>
          <span>Willing to travel</span>
        </label>
      </div>

      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Notes</label>
        <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={3} placeholder="Quick notes about this candidate..."
          style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,resize:"vertical",outline:"none"}}/>
      </div>

      <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
        <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
        <Btn onClick={()=>onSave(form)}>Save Candidate</Btn>
      </div>
    </div>
  );
};

const ICPForm = ({ icp, onSave, onCancel }) => {

    const c = form.required_emr_systems || [];
    set("required_emr_systems", c.includes(emr) ? c.filter(e=>e!==emr) : [...c, emr]);
  };
  const addSkill = () => {
    if (skillInput.trim()) { set("required_skills", [...(form.required_skills||[]), skillInput.trim()]); setSkillInput(""); }
  };

  return (
    <div style={{maxWidth:560,margin:"0 auto"}}>

          <button key={t.v} onClick={()=>set("icp_type",t.v)} style={{flex:1,padding:10,borderRadius:10,border:`2px solid ${form.icp_type===t.v?C.accent:C.border}`,background:form.icp_type===t.v?C.accentSoft:C.surface,color:form.icp_type===t.v?C.accent:C.textSecondary,fontWeight:600,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}

      {form.icp_type==="emr" && (
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Required EMR Systems</label>

            ))}
          </div>
        </div>
      )}
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Required Skills</label>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={skillInput} onChange={e=>setSkillInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSkill()} placeholder="Add skill and press Enter"
            style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.textPrimary,fontSize:13,outline:"none"}}/>

        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {(form.required_skills||[]).map((s,i)=>(
            <span key={i} style={{background:C.accentSoft,color:C.accent,padding:"4px 10px",borderRadius:20,fontSize:12,display:"flex",alignItems:"center",gap:6}}>
              {s}<button onClick={()=>set("required_skills",form.required_skills.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14}}>×</button>
            </span>
          ))}
        </div>
      </div>
      <Field label="Min Years Experience" value={form.min_years_experience} onChange={v=>set("min_years_experience",v)} type="number"/>
      <div style={{marginBottom:20}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13}}>
          <input type="checkbox" checked={form.travel_required||false} onChange={e=>set("travel_required",e.target.checked)} style={{width:16,height:16,accentColor:C.accent}}/>
          <span>Travel required for this role</span>
        </label>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Notes</label>
        <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={2}
          style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,resize:"vertical",outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
        <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
        <Btn onClick={()=>onSave(form)}>Save ICP</Btn>
      </div>
    </div>
  );
};

      {candidate.emr_systems?.length>0 && <div style={{marginBottom:16}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>EMR Systems</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{candidate.emr_systems.map(e=><Badge key={e} color="emr">{e}</Badge>)}</div></div>}
      {candidate.skills && <div style={{marginBottom:16}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Skills</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{candidate.skills.split(",").map(s=>s.trim()).filter(Boolean).map(s=><Badge key={s} color="muted">{s}</Badge>)}</div></div>}
      {candidate.target_roles && <div style={{marginBottom:16}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Target Roles</div><div style={{fontSize:13}}>{candidate.target_roles}</div></div>}
      {candidate.notes && <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:16}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Notes</div><div style={{fontSize:13,color:C.textSecondary,lineHeight:1.6}}>{candidate.notes}</div></div>}

            {relevantICPs.map(icp=>{

};

      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:24}}>

          <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..."

// ── Main App ──────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(false);
  const [candidates, setCandidates] = useState([]);
  const [icps, setICPs] = useState([]);
  const [view, setView] = useState("candidates");
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [matchICP, setMatchICP] = useState("");
  const [bulkUpload, setBulkUpload] = useState(null);

  useEffect(() => {
    (async () => {
      const token = await getSession();
      if (token) { setSession(token); await loadData(token); }
      setLoading(false);
    })();
  }, []);

  const loadData = async (token) => {
    try {
      const [cands, icpList] = await Promise.all([
        dbFetch("candidates?order=created_at.desc", token),
        dbFetch("icps?order=created_at.desc", token)
      ]);
      setCandidates(cands || []); setICPs(icpList || []); setDbError(false);
    } catch(err) {
      if (err.message.includes("relation") || err.message.includes("does not exist")) setDbError(true);
    }
  };

  const saveCandidate = async (form) => {
    try {
      const user_id = await getUserId(session);
      const payload = {
        ...form, user_id,
        years_experience: form.years_experience ? parseInt(form.years_experience) : null,
        comp_min: form.comp_min || null, comp_max: form.comp_max || null,
        available_date: form.available_date || null, last_contacted: form.last_contacted || null
      };
      if (form.id) {
        const {id, created_at, user_id: _, ...u} = payload;
        await dbFetch(`candidates?id=eq.${form.id}`, session, {method:"PATCH", body:JSON.stringify(u)});
      } else {
        await dbFetch("candidates", session, {method:"POST", body:JSON.stringify(payload)});
      }
      await loadData(session); setModal(null);
    } catch(err) { alert("Error saving: " + err.message); }
  };

  const deleteCandidate = async (id) => {
    if (!confirm("Delete this candidate?")) return;
    await dbFetch(`candidates?id=eq.${id}`, session, {method:"DELETE"});
    await loadData(session); setModal(null);
  };

  const saveICP = async (form) => {
    try {
      const user_id = await getUserId(session);
      const payload = {...form, user_id, min_years_experience: form.min_years_experience ? parseInt(form.min_years_experience) : null};
      if (form.id) {
        const {id, created_at, user_id: _, ...u} = payload;
        await dbFetch(`icps?id=eq.${form.id}`, session, {method:"PATCH", body:JSON.stringify(u)});
      } else {
        await dbFetch("icps", session, {method:"POST", body:JSON.stringify(payload)});
      }
      await loadData(session); setModal(null);
    } catch(err) { alert("Error saving: " + err.message); }
  };

  const deleteICP = async (id) => {
    if (!confirm("Delete this ICP?")) return;
    await dbFetch(`icps?id=eq.${id}`, session, {method:"DELETE"});
    await loadData(session); setModal(null);
  };

  const handleBulkUpload = async (e) => {
    const files = Array.from(e.target.files).filter(f => f.name.match(/\.(pdf|docx|txt)$/i));
    if (!files.length) return;
    const user_id = await getUserId(session);
    setBulkUpload({current:0, total:files.length, done:[], errors:[], running:true, currentName:""});
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      setBulkUpload(b => ({...b, current:i+1, currentName:file.name}));
      try {
        const text = await extractText(file);
        if (!text || text.trim().length < 30) throw new Error("No text extracted");
        const parsed = await parseResumeWithAI(text);
        const payload = {
          ...parsed, user_id,
          emr_systems: Array.isArray(parsed.emr_systems) ? parsed.emr_systems : [],
          skills: Array.isArray(parsed.skills) ? parsed.skills.join(", ") : parsed.skills || "",
          years_experience: parsed.years_experience ? parseInt(parsed.years_experience) : null,
          available_date: null, last_contacted: null, comp_min: null, comp_max: null,
          active_status: "active"
        };
        await dbFetch("candidates", session, {method:"POST", body:JSON.stringify(payload)});
        setBulkUpload(b => ({...b, done:[...b.done, {name:file.name, candidate:`${parsed.first_name} ${parsed.last_name}`}]}));
      } catch(err) {
        setBulkUpload(b => ({...b, errors:[...b.errors, {name:file.name}]}));
      }
      await new Promise(r => setTimeout(r, 400));
    }
    setBulkUpload(b => ({...b, running:false}));
    await loadData(session);
    e.target.value = "";
  };

  const filtered = candidates.filter(c => {
    const q = search.toLowerCase();
    return (!q || `${c.first_name} ${c.last_name} ${c.current_title} ${c.location} ${(c.emr_systems||[]).join(" ")} ${c.skills||""}`.toLowerCase().includes(q))
      && (filterType==="all" || c.candidate_type===filterType)
      && (filterStatus==="all" || c.active_status===filterStatus);
  });
  const sorted = matchICP ? [...filtered].sort((a,b) => {
    const icp = icps.find(i=>i.id===matchICP);
    return (scoreCandidate(b,icp)||0) - (scoreCandidate(a,icp)||0);
  }) : filtered;
  const benchGaps = EMR_SYSTEMS.map(emr => ({
    emr,
    available: candidates.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr)&&c.active_status==="active").length,
    total: candidates.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr)).length
  }));
  const navItems = [{id:"candidates",label:"Candidates",icon:"👤"},{id:"icps",label:"ICPs",icon:"🎯"},{id:"bench",label:"Bench Gaps",icon:"📊"},{id:"settings",label:"Settings",icon:"⚙️"}];

  if (loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><div style={{color:C.textSecondary}}>Loading...</div></div>;
  if (!session) return <LoginScreen/>;

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex"}}>

      {/* Sidebar */}
      <div style={{width:220,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:10}}>
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:C.accentSoft,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <div><div style={{fontSize:13,fontWeight:700}}>Recruiter CRM</div><div style={{fontSize:10,color:C.textMuted}}>Healthcare IT</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:"8px 12px"}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>{setView(item.id);setModal(null);}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:view===item.id?C.accentSoft:"transparent",color:view===item.id?C.accent:C.textSecondary,fontSize:13,fontWeight:view===item.id?600:400,textAlign:"left"}}>
              <span>{item.icon}</span>{item.label}
              {item.id==="candidates" && <span style={{marginLeft:"auto",fontSize:11,background:C.border,padding:"1px 7px",borderRadius:10,color:C.textMuted}}>{candidates.length}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:"16px 12px",borderTop:`1px solid ${C.border}`}}>
          <button onClick={signOut} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,border:"none",background:"transparent",color:C.textMuted,fontSize:12,cursor:"pointer"}}>↩ Sign Out</button>
        </div>
      </div>

      {/* Main content */}
      <div style={{marginLeft:220,flex:1,padding:32,maxWidth:"calc(100vw - 220px)",overflowX:"hidden"}}>

        {dbError && <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:10,padding:16,marginBottom:24}}><div style={{fontWeight:600,color:C.warning,marginBottom:6}}>⚠️ Database setup needed</div><div style={{fontSize:13,color:C.textSecondary}}>Run supabase-setup.sql in Supabase Dashboard → SQL Editor.</div></div>}

        {/* Bulk upload progress modal */}
        {bulkUpload && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:"100%",maxWidth:520}}>
              <h2 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Bulk Upload</h2>
              <p style={{fontSize:13,color:C.textSecondary,marginBottom:20}}>
                {bulkUpload.running ? `Processing ${bulkUpload.current} of ${bulkUpload.total}...` : `Complete — ${bulkUpload.done.length} imported, ${bulkUpload.errors.length} failed`}
              </p>
              {bulkUpload.running && (
                <div style={{marginBottom:20}}>
                  <div style={{background:C.surface,borderRadius:8,height:8,marginBottom:8,overflow:"hidden"}}>
                    <div style={{width:`${(bulkUpload.current/bulkUpload.total)*100}%`,height:"100%",background:C.accent,borderRadius:8,transition:"width 0.3s"}}/>
                  </div>
                  <div style={{fontSize:12,color:C.textMuted}}>📄 {bulkUpload.currentName}</div>
                </div>
              )}
              {bulkUpload.done.length>0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>✓ Imported ({bulkUpload.done.length})</div>
                  <div style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                    {bulkUpload.done.map((d,i)=>(
                      <div key={i} style={{fontSize:12,color:C.success,background:"rgba(34,197,94,0.08)",padding:"4px 10px",borderRadius:6}}>{d.candidate} <span style={{color:C.textMuted}}>— {d.name}</span></div>
                    ))}
                  </div>
                </div>
              )}
              {bulkUpload.errors.length>0 && (
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>✗ Failed ({bulkUpload.errors.length})</div>
                  <div style={{maxHeight:100,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                    {bulkUpload.errors.map((d,i)=>(
                      <div key={i} style={{fontSize:12,color:C.danger,background:"rgba(239,68,68,0.08)",padding:"4px 10px",borderRadius:6}}>{d.name}</div>
                    ))}
                  </div>
                </div>
              )}
              {!bulkUpload.running && <Btn onClick={()=>setBulkUpload(null)}>Done</Btn>}
            </div>
          </div>
        )}

        {/* Regular modals */}
        {modal && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 20px",overflowY:"auto"}}>
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:"100%",maxWidth:720}}>
              {modal==="add_candidate" && <CandidateForm onSave={saveCandidate} onCancel={()=>setModal(null)}/>}
              {modal==="edit_candidate" && <CandidateForm candidate={selected} onSave={saveCandidate} onCancel={()=>setModal(null)}/>}
              {modal==="add_icp" && <ICPForm onSave={saveICP} onCancel={()=>setModal(null)}/>}
              {modal==="edit_icp" && <ICPForm icp={selected} onSave={saveICP} onCancel={()=>setModal(null)}/>}
              {modal==="detail" && <CandidateDetail candidate={selected} icps={icps} onEdit={()=>setModal("edit_candidate")} onClose={()=>setModal(null)} onDelete={()=>deleteCandidate(selected.id)}/>}
            </div>
          </div>
        )}

        {/* Candidates view */}
        {view==="candidates" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Candidates</h1>
                <p style={{color:C.textSecondary,fontSize:13}}>{candidates.length} total · {candidates.filter(c=>c.active_status==="active").length} active</p>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <label style={{cursor:"pointer"}}>
                  <span style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,color:C.textPrimary,cursor:"pointer",display:"inline-block"}}>📁 Bulk Upload</span>
                  <input type="file" multiple accept=".pdf,.docx,.txt" onChange={handleBulkUpload} style={{display:"none"}}/>
                </label>
                <Btn onClick={()=>{setSelected(null);setModal("add_candidate");}}>+ Add Candidate</Btn>
              </div>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, title, EMR, location..."
                style={{flex:1,minWidth:200,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}/>
              <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}>
                <option value="all">All Types</option><option value="emr">EMR Project</option><option value="it_leadership">IT / Leadership</option>
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}>
                <option value="all">All Statuses</option><option value="active">Active</option><option value="passive">Passive</option><option value="placed">Placed</option>
              </select>
              {icps.length>0 && (
                <select value={matchICP} onChange={e=>setMatchICP(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}>
                  <option value="">Sort by ICP match...</option>
                  {icps.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
                </select>
              )}
            </div>

            {sorted.length===0 ? (
              <div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted}}>
                <div style={{fontSize:40,marginBottom:16}}>👤</div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:8,color:C.textSecondary}}>No candidates yet</div>
                <div style={{fontSize:13,marginBottom:20}}>Add your first candidate or use Bulk Upload to import resumes</div>
                <Btn onClick={()=>setModal("add_candidate")}>+ Add Candidate</Btn>
              </div>
            ) : (
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{borderBottom:`1px solid ${C.border}`}}>
                      {["Name","Type","Title / Company","EMR / Skills","Status","Available",matchICP?"ICP Score":"Last Contact"].map(h=>(
                        <th key={h} style={{padding:"12px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map((c,i)=>{
                      const icp = matchICP ? icps.find(x=>x.id===matchICP) : null;
                      const score = icp ? scoreCandidate(c,icp) : null;
                      return (
                        <tr key={c.id} onClick={()=>{setSelected(c);setModal("detail");}}
                          style={{borderBottom:i<sorted.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}
                          onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <td style={{padding:"14px 16px"}}><div style={{fontWeight:600,fontSize:13}}>{c.first_name} {c.last_name}</div><div style={{fontSize:11,color:C.textMuted}}>{c.location}</div></td>
                          <td style={{padding:"14px 16px"}}><Badge color={c.candidate_type==="emr"?"emr":"it"}>{c.candidate_type==="emr"?"EMR":"IT"}</Badge></td>
                          <td style={{padding:"14px 16px",fontSize:12,color:C.textSecondary,maxWidth:160}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.current_title}</div><div style={{fontSize:11,color:C.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.current_company}</div></td>
                          <td style={{padding:"14px 16px"}}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{c.candidate_type==="emr"?(c.emr_systems||[]).slice(0,3).map(e=><Badge key={e} color="emr" size="sm">{e}</Badge>):(c.skills||"").split(",").slice(0,2).filter(Boolean).map(s=><Badge key={s} color="muted" size="sm">{s.trim()}</Badge>)}</div></td>
                          <td style={{padding:"14px 16px"}}><Badge color={c.active_status==="active"?"success":c.active_status==="passive"?"warning":"muted"}>{c.active_status?.replace(/_/g," ")}</Badge></td>
                          <td style={{padding:"14px 16px",fontSize:12,color:C.textSecondary}}>{c.available_date||"—"}</td>
                          <td style={{padding:"14px 16px"}}>{matchICP?<ScoreBadge score={score}/>:<span style={{fontSize:12,color:C.textSecondary}}>{c.last_contacted||"—"}</span>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {/* ICPs view */}
        {view==="icps" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <div><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Ideal Candidate Profiles</h1><p style={{color:C.textSecondary,fontSize:13}}>Define what great looks like for each role or EMR</p></div>
              <Btn onClick={()=>{setSelected(null);setModal("add_icp");}}>+ New ICP</Btn>
            </div>
            {icps.length===0 ? (
              <div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted}}>
                <div style={{fontSize:40,marginBottom:16}}>🎯</div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:8,color:C.textSecondary}}>No ICPs yet</div>
                <div style={{fontSize:13,marginBottom:20}}>Create an ICP for each EMR you staff for and your frequent IT roles</div>
                <Btn onClick={()=>setModal("add_icp")}>+ New ICP</Btn>
              </div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))",gap:16}}>
                {icps.map(icp=>{
                  const matchCount = candidates.filter(c=>{const s=scoreCandidate(c,icp);return s!==null&&s>=60;}).length;
                  return (
                    <div key={icp.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
                        <div><div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{icp.name}</div><Badge color={icp.icp_type==="emr"?"emr":"it"}>{icp.icp_type==="emr"?"EMR Project":"IT / Leadership"}</Badge></div>
                        <div style={{display:"flex",gap:6}}>
                          <Btn variant="ghost" size="sm" onClick={()=>{setSelected(icp);setModal("edit_icp");}}>Edit</Btn>
                          <Btn variant="danger" size="sm" onClick={()=>deleteICP(icp.id)}>✕</Btn>
                        </div>
                      </div>
                      {icp.required_emr_systems?.length>0 && <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>Required EMRs</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{icp.required_emr_systems.map(e=><Badge key={e} color="emr" size="sm">{e}</Badge>)}</div></div>}
                      {icp.required_skills?.length>0 && <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>Required Skills</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{icp.required_skills.map(s=><Badge key={s} color="accent" size="sm">{s}</Badge>)}</div></div>}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                        <span style={{fontSize:12,color:C.textSecondary}}>{icp.min_years_experience?`${icp.min_years_experience}+ yrs`:"Any exp"} · {icp.travel_required?"Travel req.":"No travel req."}</span>
                        <Badge color={matchCount>3?"success":matchCount>0?"warning":"danger"}>{matchCount} match{matchCount!==1?"es":""}</Badge>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* Bench Gaps view */}
        {view==="bench" && (
          <div>
            <div style={{marginBottom:24}}><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Bench Gaps</h1><p style={{color:C.textSecondary,fontSize:13}}>Where you're thin on available candidates by EMR system</p></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:12,marginBottom:32}}>
              {benchGaps.map(({emr,available,total})=>(
                <div key={emr} style={{background:C.surface,border:`1px solid ${available===0?"rgba(239,68,68,0.3)":available<=1?"rgba(245,158,11,0.3)":C.border}`,borderRadius:12,padding:18}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontWeight:700,fontSize:14}}>{emr}</span>
                    <Badge color={available===0?"danger":available<=1?"warning":"success"}>{available===0?"Gap":available<=1?"Thin":"OK"}</Badge>
                  </div>
                  <div style={{fontSize:28,fontWeight:700,fontFamily:"monospace",color:available===0?C.danger:available<=1?C.warning:C.success}}>{available}</div>
                  <div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{available} available · {total} total</div>
                  <div style={{marginTop:12,background:C.bg,borderRadius:6,height:4,overflow:"hidden"}}>
                    <div style={{width:total>0?`${(available/Math.max(total,5))*100}%`:"0%",height:"100%",background:available===0?C.danger:available<=1?C.warning:C.success,borderRadius:6}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>IT / Leadership Bench</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:16}}>
                {[
                  {label:"Total IT/Leadership",value:candidates.filter(c=>c.candidate_type==="it_leadership").length},
                  {label:"Active / Looking",value:candidates.filter(c=>c.candidate_type==="it_leadership"&&c.active_status==="active").length},
                  {label:"Passive / Open",value:candidates.filter(c=>c.candidate_type==="it_leadership"&&c.active_status==="passive").length}
                ].map(stat=>(
                  <div key={stat.label} style={{textAlign:"center"}}>
                    <div style={{fontSize:32,fontWeight:700,fontFamily:"monospace",color:C.accent}}>{stat.value}</div>
                    <div style={{fontSize:12,color:C.textSecondary,marginTop:4}}>{stat.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Settings view */}
        {view==="settings" && <SettingsView/>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
