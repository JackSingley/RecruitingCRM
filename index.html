const SUPABASE_URL = "https://ztbbdaciykxgdrnmprgx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0YmJkYWNpeWt4Z2Rybm1wcmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjQ4MjUsImV4cCI6MjA5ODAwMDgyNX0.Or9nsyU8h43tRlAJQyPLbKqbzpPi0xHYDRlHGdjJHvc";
const getAnthropicKey = () => localStorage.getItem("anthropic_api_key") || "";
const EMR_SYSTEMS = ["eCW","athena","ModMed","NextGen","Experity","Epic","Cerner","Meditech","Allscripts","PointClickCare"];
const EMR_SUBTABS = ["athena","eCW","ModMed","NextGen","Experity"];
const C = {bg:"#0F1117",surface:"#1A1D27",surfaceHover:"#21253A",border:"#2A2D3E",accent:"#4F7CFF",accentSoft:"rgba(79,124,255,0.12)",success:"#22C55E",warning:"#F59E0B",danger:"#EF4444",textPrimary:"#F0F2FF",textSecondary:"#8B90A8",textMuted:"#555870",emrSoft:"rgba(124,58,237,0.12)",itSoft:"rgba(8,145,178,0.12)"};

const sbH = (t) => ({"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${t||SUPABASE_ANON_KEY}`,"Prefer":"return=representation"});
const signInWithGoogle = () => { window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.href.split('#')[0])}`; };
const getSession = async () => {
  const h = window.location.hash;
  if (h) {
    const p = new URLSearchParams(h.substring(1));
    const at = p.get("access_token"), rt = p.get("refresh_token");
    if (at) { localStorage.setItem("sb_access_token",at); if(rt) localStorage.setItem("sb_refresh_token",rt); window.history.replaceState({},"",window.location.pathname); return at; }
  }
  return localStorage.getItem("sb_access_token");
};
const signOut = () => { localStorage.removeItem("sb_access_token"); localStorage.removeItem("sb_refresh_token"); window.location.reload(); };
const refreshSession = async () => {
  const rt = localStorage.getItem("sb_refresh_token"); if(!rt) return null;
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY},body:JSON.stringify({refresh_token:rt})});
    if(!r.ok) return null;
    const d = await r.json();
    if(d.access_token) { localStorage.setItem("sb_access_token",d.access_token); if(d.refresh_token) localStorage.setItem("sb_refresh_token",d.refresh_token); return d.access_token; }
  } catch(e) {}
  return null;
};
const dbFetch = async (path, token, options={}) => {
  let r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:sbH(token),...options});
  if(r.status===401) { const nt=await refreshSession(); if(nt) r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:sbH(nt),...options}); }
  if(!r.ok) { const e=await r.text(); throw new Error(e); }
  const t = await r.text(); return t ? JSON.parse(t) : null;
};
const getUserId = async (token) => {
  let r = await fetch(`${SUPABASE_URL}/auth/v1/user`,{headers:sbH(token)});
  if(r.status===401) { const nt=await refreshSession(); if(nt) r=await fetch(`${SUPABASE_URL}/auth/v1/user`,{headers:sbH(nt)}); }
  return (await r.json()).id;
};
const extractText = async (file) => {
  if(file.name.endsWith(".pdf")||file.type==="application/pdf") {
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const ab=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:ab}).promise; let text="";
    for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();text+=c.items.map(x=>x.str).join(" ")+"\n";}
    return text;
  } else if(file.name.endsWith(".docx")) {
    const ab=await file.arrayBuffer(); return (await mammoth.extractRawText({arrayBuffer:ab})).value;
  } else { return await file.text(); }
};
const parseResumeWithAI = async (text) => {
  const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getAnthropicKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`Parse this resume and return ONLY valid JSON no markdown:\n{"first_name":"","last_name":"","email":"","phone":"","location":"","linkedin_url":"","candidate_type":"emr","emr_systems":[],"skills":"","current_title":"","current_company":"","years_experience":0,"target_roles":"","travel_willing":false,"notes":""}\ncandidate_type: emr if EMR/EHR trainer/consultant else it_leadership\nemr_systems: only from eCW,athena,ModMed,NextGen,Experity,Epic,Cerner,Meditech,Allscripts,PointClickCare\nskills: comma-separated string\nnotes: 1-2 sentences\nResume:\n${text.substring(0,3000)}`}]})});
  const d = await r.json(); return JSON.parse(d.content[0].text.replace(/```json|```/g,"").trim());
};
const mergeProfiles = (ex, inc) => {
  const ms = (a,b) => { if(!a&&!b) return ""; if(!a) return b; if(!b) return a; const s=new Set(a.split(",").map(x=>x.trim()).filter(Boolean)); b.split(",").map(x=>x.trim()).filter(Boolean).forEach(x=>s.add(x)); return Array.from(s).join(", "); };
  return {...ex,first_name:ex.first_name||inc.first_name,last_name:ex.last_name||inc.last_name,email:ex.email||inc.email,phone:ex.phone||inc.phone,location:ex.location||inc.location,linkedin_url:ex.linkedin_url||inc.linkedin_url,current_title:inc.current_title||ex.current_title,current_company:inc.current_company||ex.current_company,years_experience:inc.years_experience||ex.years_experience,target_roles:ex.target_roles||inc.target_roles,travel_willing:ex.travel_willing||inc.travel_willing,emr_systems:Array.from(new Set([...(ex.emr_systems||[]),...(inc.emr_systems||[])])),skills:ms(ex.skills,inc.skills),notes:ex.notes&&inc.notes?`${ex.notes}\n[Updated]: ${inc.notes}`:ex.notes||inc.notes||""};
};
const scoreCandidate = (c, icp) => {
  if(!icp) return null; let sc=0,mx=0;
  if(icp.required_emr_systems?.length>0&&c.emr_systems?.length>0){mx+=40;sc+=(icp.required_emr_systems.filter(e=>c.emr_systems?.includes(e)).length/icp.required_emr_systems.length)*40;}
  if(icp.required_skills?.length>0&&c.skills){mx+=30;sc+=(icp.required_skills.filter(s=>c.skills?.toLowerCase().includes(s.toLowerCase())).length/icp.required_skills.length)*30;}
  if(icp.min_years_experience&&c.years_experience){mx+=20;if(c.years_experience>=icp.min_years_experience)sc+=20;else if(c.years_experience>=icp.min_years_experience-2)sc+=10;}
  if(icp.travel_required&&c.travel_willing){mx+=10;sc+=10;}
  return mx>0?Math.round((sc/mx)*100):null;
};

const Badge = ({children,color="accent",size="sm"}) => {
  const m={accent:{bg:C.accentSoft,text:C.accent},emr:{bg:C.emrSoft,text:"#A78BFA"},it:{bg:C.itSoft,text:"#22D3EE"},success:{bg:"rgba(34,197,94,0.12)",text:C.success},warning:{bg:"rgba(245,158,11,0.12)",text:C.warning},danger:{bg:"rgba(239,68,68,0.12)",text:C.danger},muted:{bg:"rgba(139,144,168,0.12)",text:C.textSecondary}};
  const c=m[color]||m.accent;
  return <span style={{background:c.bg,color:c.text,padding:size==="sm"?"2px 8px":"4px 12px",borderRadius:20,fontSize:size==="sm"?11:12,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
};
const Btn = ({children,onClick,variant="primary",size="md",disabled,style:s={}}) => {
  const v={primary:{background:C.accent,color:"#fff",border:"none"},secondary:{background:C.surface,color:C.textPrimary,border:`1px solid ${C.border}`},ghost:{background:"transparent",color:C.textSecondary,border:"none"},danger:{background:"rgba(239,68,68,0.1)",color:C.danger,border:"1px solid rgba(239,68,68,0.3)"}};
  const sz={sm:{padding:"6px 12px",fontSize:12},md:{padding:"8px 16px",fontSize:13},lg:{padding:"12px 24px",fontSize:14}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],...sz[size],borderRadius:8,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...s}}>{children}</button>;
};
const Field = ({label,value,onChange,placeholder,type="text",required}) => (
  <div style={{marginBottom:16}}>
    {label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>{label}{required&&<span style={{color:C.accent}}> *</span>}</label>}
    <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}/>
  </div>
);
const Sel = ({label,value,onChange,options}) => (
  <div style={{marginBottom:16}}>
    {label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>{label}</label>}
    <select value={value||""} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);
const ScoreBadge = ({score}) => { if(score===null||score===undefined) return <Badge color="muted">No ICP</Badge>; return <Badge color={score>=75?"success":score>=50?"warning":"danger"}>{score}% match</Badge>; };

const LoginScreen = () => (
  <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
    <div style={{textAlign:"center",maxWidth:400,padding:40}}>
      <div style={{width:64,height:64,background:C.accentSoft,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:28}}>&#9889;</div>
      <h1 style={{fontSize:28,fontWeight:700,marginBottom:8}}>Recruiter CRM</h1>
      <p style={{color:C.textSecondary,marginBottom:32,fontSize:14,lineHeight:1.6}}>Your healthcare IT candidate bench, always at your fingertips.</p>
      <button onClick={signInWithGoogle} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",color:"#1F2937",border:"none",borderRadius:10,padding:"14px 24px",fontSize:14,fontWeight:600,cursor:"pointer",margin:"0 auto",width:"100%",justifyContent:"center"}}>
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Continue with Google
      </button>
    </div>

);

const CandidateForm = ({candidate, onSave, onCancel}) => {
  const [form,setForm] = useState(candidate||{candidate_type:"emr",first_name:"",last_name:"",email:"",phone:"",location:"",linkedin_url:"",current_title:"",current_company:"",years_experience:"",emr_systems:[],skills:"",target_roles:"",comp_min:"",comp_max:"",travel_willing:false,available_date:"",active_status:"active",notes:"",last_contacted:""});
  const [parsing,setParsing] = useState(false);
  const [parseMsg,setParseMsg] = useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleEMR = (emr) => { const c=form.emr_systems||[]; set("emr_systems",c.includes(emr)?c.filter(e=>e!==emr):[...c,emr]); };
  const handleResume = async (e) => {
    const file=e.target.files[0]; if(!file) return;
    setParsing(true); setParseMsg("");
    try {
      const text=await extractText(file);
      if(!text||text.trim().length<50) throw new Error("No text");
      const parsed=await parseResumeWithAI(text);
      setForm(f=>({...f,...parsed,emr_systems:Array.isArray(parsed.emr_systems)?parsed.emr_systems:[],skills:Array.isArray(parsed.skills)?parsed.skills.join(", "):parsed.skills||""}));
      setParseMsg("Resume parsed successfully");
    } catch(err) { setParseMsg("Could not parse resume - please fill in manually"); }
    setParsing(false);
  };
  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <h2 style={{fontSize:18,fontWeight:700}}>{candidate?.id?"Edit Candidate":"Add Candidate"}</h2>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
      </div>
      <div style={{background:C.accentSoft,border:`1px dashed ${C.accent}`,borderRadius:10,padding:20,marginBottom:24,textAlign:"center"}}>
        <div style={{fontSize:13,color:C.accent,fontWeight:600,marginBottom:6}}>AI Resume Parser</div>
        <div style={{fontSize:12,color:C.textSecondary,marginBottom:12}}>Upload a resume (.pdf, .docx, .txt) and AI will auto-fill the form</div>
        <label style={{cursor:"pointer",display:"inline-block"}}>
          <span style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,color:C.textPrimary,display:"inline-block"}}>{parsing?"Parsing...":"Upload Resume"}</span>
          <input type="file" accept=".pdf,.docx,.txt" onChange={handleResume} style={{display:"none"}} disabled={parsing}/>
        </label>
        {parseMsg&&<div style={{fontSize:12,marginTop:8,color:parseMsg.startsWith("Resume parsed")?C.success:C.danger}}>{parseMsg}</div>}
      </div>
      <div style={{display:"flex",gap:12,marginBottom:20}}>
        {[{v:"emr",label:"EMR Project",color:"#7C3AED"},{v:"it_leadership",label:"IT / Leadership",color:"#0891B2"}].map(t=>(
          <button key={t.v} onClick={()=>set("candidate_type",t.v)} style={{flex:1,padding:12,borderRadius:10,border:`2px solid ${form.candidate_type===t.v?t.color:C.border}`,background:form.candidate_type===t.v?`${t.color}20`:C.surface,color:form.candidate_type===t.v?t.color:C.textSecondary,fontWeight:600,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <Field label="First Name" value={form.first_name} onChange={v=>set("first_name",v)} required/>
        <Field label="Last Name" value={form.last_name} onChange={v=>set("last_name",v)} required/>
        <Field label="Email" value={form.email} onChange={v=>set("email",v)} type="email"/>
        <Field label="Phone" value={form.phone} onChange={v=>set("phone",v)}/>
        <Field label="Location" value={form.location} onChange={v=>set("location",v)} placeholder="City, State"/>
        <Field label="LinkedIn URL" value={form.linkedin_url} onChange={v=>set("linkedin_url",v)}/>
        <Field label="Current Title" value={form.current_title} onChange={v=>set("current_title",v)}/>
        <Field label="Current Company" value={form.current_company} onChange={v=>set("current_company",v)}/>
        <Field label="Years Experience" value={form.years_experience} onChange={v=>set("years_experience",v)} type="number"/>
        <Sel label="Status" value={form.active_status} onChange={v=>set("active_status",v)} options={[{value:"active",label:"Active - Looking"},{value:"passive",label:"Passive - Open"},{value:"placed",label:"Placed / Unavailable"},{value:"do_not_contact",label:"Do Not Contact"}]}/>
      </div>
      {form.candidate_type==="emr"&&(
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>EMR Proficiencies</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {EMR_SYSTEMS.map(emr=>(
              <button key={emr} onClick={()=>toggleEMR(emr)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:`1px solid ${(form.emr_systems||[]).includes(emr)?"#A78BFA":C.border}`,background:(form.emr_systems||[]).includes(emr)?C.emrSoft:C.surface,color:(form.emr_systems||[]).includes(emr)?"#A78BFA":C.textSecondary}}>{emr}</button>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <Field label="Available Date" value={form.available_date} onChange={v=>set("available_date",v)} type="date"/>
        <Field label="Last Contacted" value={form.last_contacted} onChange={v=>set("last_contacted",v)} type="date"/>
        <Field label="Pay Min ($/hr)" value={form.comp_min} onChange={v=>set("comp_min",v)}/>
        <Field label="Pay Max ($/hr)" value={form.comp_max} onChange={v=>set("comp_max",v)}/>
      </div>
      <Field label="Skills / Tech Stack" value={form.skills} onChange={v=>set("skills",v)} placeholder="Comma separated..."/>
      <Field label="Target Roles" value={form.target_roles} onChange={v=>set("target_roles",v)} placeholder="e.g. IT Project Manager..."/>
      <div style={{marginBottom:16}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13}}>
          <input type="checkbox" checked={form.travel_willing||false} onChange={e=>set("travel_willing",e.target.checked)} style={{width:16,height:16,accentColor:C.accent}}/>
          <span>Willing to travel</span>
        </label>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Notes</label>
        <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={3} placeholder="Quick notes about this candidate..." style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.textPrimary,fontSize:13,resize:"vertical",outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
        <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
        <Btn onClick={()=>onSave(form)}>Save Candidate</Btn>
      </div>
    </div>
  );
};

const ICPForm = ({icp, onSave, onCancel}) => {

  const [skillInput,setSkillInput] = useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleEMR = (emr) => { const c=form.required_emr_systems||[]; set("required_emr_systems",c.includes(emr)?c.filter(e=>e!==emr):[...c,emr]); };
  const addSkill = () => { if(skillInput.trim()){set("required_skills",[...(form.required_skills||[]),skillInput.trim()]);setSkillInput("");} };
  return (
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>

        {[{v:"emr",label:"EMR Project"},{v:"it_leadership",label:"IT / Leadership"}].map(t=>(
          <button key={t.v} onClick={()=>set("icp_type",t.v)} style={{flex:1,padding:10,borderRadius:10,border:`2px solid ${form.icp_type===t.v?C.accent:C.border}`,background:form.icp_type===t.v?C.accentSoft:C.surface,color:form.icp_type===t.v?C.accent:C.textSecondary,fontWeight:600,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>
      {form.icp_type==="emr"&&(
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Required EMR Systems</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {EMR_SYSTEMS.map(emr=>(
              <button key={emr} onClick={()=>toggleEMR(emr)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:`1px solid ${(form.required_emr_systems||[]).includes(emr)?"#A78BFA":C.border}`,background:(form.required_emr_systems||[]).includes(emr)?C.emrSoft:C.surface,color:(form.required_emr_systems||[]).includes(emr)?"#A78BFA":C.textSecondary}}>{emr}</button>
            ))}
          </div>
        </div>
      )}
      <div style={{marginBottom:16}}>

    </div>
  );
};

function App() {
  const [session,setSession] = useState(null);
  const [loading,setLoading] = useState(true);
  const [dbError,setDbError] = useState(false);
  const [candidates,setCandidates] = useState([]);
  const [icps,setICPs] = useState([]);
  const [view,setView] = useState("all");
  const [emrOpen,setEmrOpen] = useState(true);
  const [modal,setModal] = useState(null);
  const [selected,setSelected] = useState(null);
  const [search,setSearch] = useState("");
  const [filterStatus,setFilterStatus] = useState("all");
  const [matchICP,setMatchICP] = useState("");
  const [bulkUpload,setBulkUpload] = useState(null);

  useEffect(()=>{
    (async()=>{ const token=await getSession(); if(token){setSession(token);await loadData(token);} setLoading(false); })();
    const interval=setInterval(async()=>{ const nt=await refreshSession(); if(nt) setSession(nt); },10*60*1000);
    return ()=>clearInterval(interval);
  },[]);

  const loadData = async (token) => {
    try {
      const [cands,icpList]=await Promise.all([dbFetch("candidates?order=created_at.desc",token),dbFetch("icps?order=created_at.desc",token)]);
      setCandidates(cands||[]); setICPs(icpList||[]); setDbError(false);
    } catch(err){ if(err.message.includes("relation")||err.message.includes("does not exist")) setDbError(true); }
  };

  const saveCandidate = async (form) => {
    try {
      const user_id=await getUserId(session);
      const payload={...form,user_id,years_experience:form.years_experience?parseInt(form.years_experience):null,comp_min:form.comp_min||null,comp_max:form.comp_max||null,available_date:form.available_date||null,last_contacted:form.last_contacted||null};
      if(form.id){const{id,created_at,user_id:_,...u}=payload;await dbFetch(`candidates?id=eq.${form.id}`,session,{method:"PATCH",body:JSON.stringify(u)});}
      else{await dbFetch("candidates",session,{method:"POST",body:JSON.stringify(payload)});}
      await loadData(session); setModal(null);
    } catch(err){alert("Error saving: "+err.message);}
  };

  const deleteCandidate = async (id) => {
    if(!confirm("Delete this candidate?")) return;
    await dbFetch(`candidates?id=eq.${id}`,session,{method:"DELETE"});
    await loadData(session); setModal(null);
  };

  const saveICP = async (form) => {
    try {
      const user_id=await getUserId(session);
      const payload={...form,user_id,min_years_experience:form.min_years_experience?parseInt(form.min_years_experience):null};
      if(form.id){const{id,created_at,user_id:_,...u}=payload;await dbFetch(`icps?id=eq.${form.id}`,session,{method:"PATCH",body:JSON.stringify(u)});}
      else{await dbFetch("icps",session,{method:"POST",body:JSON.stringify(payload)});}
      await loadData(session); setModal(null);
    } catch(err){alert("Error saving: "+err.message);}
  };

  const deleteICP = async (id) => {
    if(!confirm("Delete this ICP?")) return;
    await dbFetch(`icps?id=eq.${id}`,session,{method:"DELETE"});
    await loadData(session); setModal(null);
  };

  const handleBulkUpload = async (e) => {
    const files=Array.from(e.target.files).filter(f=>f.name.match(/\.(pdf|docx|txt)$/i));
    if(!files.length) return;
    const user_id=await getUserId(session);
    const existingCands=[...candidates];
    setBulkUpload({current:0,total:files.length,done:[],merged:[],errors:[],running:true,currentName:""});
    for(let i=0;i<files.length;i++){
      const file=files[i];
      setBulkUpload(b=>({...b,current:i+1,currentName:file.name}));
      try {
        const text=await extractText(file);
        if(!text||text.trim().length<30) throw new Error("No text");
        const parsed=await parseResumeWithAI(text);
        const fn=(parsed.first_name||"").toLowerCase().trim();
        const ln=(parsed.last_name||"").toLowerCase().trim();
        const em=(parsed.email||"").toLowerCase().trim();
        const dup=existingCands.find(c=>{
          const nm=fn&&ln&&c.first_name?.toLowerCase().trim()===fn&&c.last_name?.toLowerCase().trim()===ln;
          const eml=em&&c.email?.toLowerCase().trim()===em;
          return nm||eml;
        });
        if(dup){
          const inc={...parsed,emr_systems:Array.isArray(parsed.emr_systems)?parsed.emr_systems:[],skills:Array.isArray(parsed.skills)?parsed.skills.join(", "):parsed.skills||"",years_experience:parsed.years_experience?parseInt(parsed.years_experience):null};
          const merged=mergeProfiles(dup,inc);
          const{id,created_at,user_id:_,...up}=merged;
          await dbFetch(`candidates?id=eq.${dup.id}`,session,{method:"PATCH",body:JSON.stringify(up)});
          const idx=existingCands.findIndex(c=>c.id===dup.id);
          if(idx>=0) existingCands[idx]={...dup,...merged};
          setBulkUpload(b=>({...b,merged:[...b.merged,{name:file.name,candidate:`${dup.first_name} ${dup.last_name}`}]}));
        } else {
          const payload={...parsed,user_id,emr_systems:Array.isArray(parsed.emr_systems)?parsed.emr_systems:[],skills:Array.isArray(parsed.skills)?parsed.skills.join(", "):parsed.skills||"",years_experience:parsed.years_experience?parseInt(parsed.years_experience):null,available_date:null,last_contacted:null,comp_min:null,comp_max:null,active_status:"active"};
          const nc=await dbFetch("candidates",session,{method:"POST",body:JSON.stringify(payload)});
          if(nc&&nc[0]) existingCands.push(nc[0]);
          setBulkUpload(b=>({...b,done:[...b.done,{name:file.name,candidate:`${parsed.first_name} ${parsed.last_name}`}]}));
        }
      } catch(err){ setBulkUpload(b=>({...b,errors:[...b.errors,{name:file.name}]})); }
      await new Promise(r=>setTimeout(r,400));
    }
    setBulkUpload(b=>({...b,running:false}));
    await loadData(session);
    e.target.value="";
  };

  const getFiltered = () => {
    let list=candidates;
    if(view==="emr") list=list.filter(c=>c.candidate_type==="emr");
    else if(view==="genit") list=list.filter(c=>c.candidate_type==="it_leadership");
    else if(view.startsWith("emr_")){const emr=EMR_SUBTABS.find(e=>`emr_${e.toLowerCase()}`===view);if(emr) list=list.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr));}
    const q=search.toLowerCase();
    if(q) list=list.filter(c=>`${c.first_name} ${c.last_name} ${c.current_title} ${c.location} ${(c.emr_systems||[]).join(" ")} ${c.skills||""}`.toLowerCase().includes(q));
    if(filterStatus!=="all") list=list.filter(c=>c.active_status===filterStatus);
    if(matchICP){const icp=icps.find(i=>i.id===matchICP);list=[...list].sort((a,b)=>(scoreCandidate(b,icp)||0)-(scoreCandidate(a,icp)||0));}
    return list;
  };

  const filtered=getFiltered();
  const emrCount=candidates.filter(c=>c.candidate_type==="emr").length;
  const itCount=candidates.filter(c=>c.candidate_type==="it_leadership").length;
  const benchGaps=EMR_SYSTEMS.map(emr=>({emr,available:candidates.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr)&&c.active_status==="active").length,total:candidates.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr)).length}));
  const getTitle=()=>{if(view==="all")return"All Candidates";if(view==="emr")return"EMR Candidates";if(view==="genit")return"IT / Leadership";if(view.startsWith("emr_")){const emr=EMR_SUBTABS.find(e=>`emr_${e.toLowerCase()}`===view);return emr?`${emr} Candidates`:"EMR";}return"Candidates";};
  const isCandView=!["icps","bench","settings"].includes(view);

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><div style={{color:C.textSecondary}}>Loading...</div></div>;
  if(!session) return <LoginScreen/>;

  const navBtn = (id,label,icon,count,isActive) => (
    <button onClick={()=>setView(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:isActive?C.accentSoft:"transparent",color:isActive?C.accent:C.textSecondary,fontSize:13,fontWeight:isActive?600:400,textAlign:"left"}}>
      <span>{icon}</span>{label}
      {count!==undefined&&<span style={{marginLeft:"auto",fontSize:11,background:C.border,padding:"1px 7px",borderRadius:10,color:C.textMuted}}>{count}</span>}
    </button>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex"}}>
      <div style={{width:230,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:10,overflowY:"auto"}}>
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:C.accentSoft,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>&#9889;</div>
            <div><div style={{fontSize:13,fontWeight:700}}>Recruiter CRM</div><div style={{fontSize:10,color:C.textMuted}}>Healthcare IT</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:"8px 12px"}}>
          {navBtn("all","All Candidates","&#128101;",candidates.length,view==="all")}
          <div style={{marginTop:8}}>
            <button onClick={()=>{setEmrOpen(o=>!o);setView("emr");}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:view==="emr"||view.startsWith("emr_")?C.accentSoft:"transparent",color:view==="emr"||view.startsWith("emr_")?C.accent:C.textSecondary,fontSize:13,fontWeight:600,textAlign:"left"}}>
              <span>&#127973;</span>EMR
              <span style={{marginLeft:"auto",fontSize:11,background:C.border,padding:"1px 7px",borderRadius:10,color:C.textMuted}}>{emrCount}</span>
              <span style={{fontSize:10,color:C.textMuted,marginLeft:4}}>{emrOpen?"v":">"}</span>
            </button>
            {emrOpen&&(
              <div style={{marginLeft:12,borderLeft:`1px solid ${C.border}`,paddingLeft:8,marginBottom:4}}>
                {EMR_SUBTABS.map(emr=>{
                  const sv=`emr_${emr.toLowerCase()}`;
                  const cnt=candidates.filter(c=>c.candidate_type==="emr"&&(c.emr_systems||[]).includes(emr)).length;
                  return (
                    <button key={emr} onClick={()=>setView(sv)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,border:"none",cursor:"pointer",marginBottom:1,background:view===sv?"rgba(124,58,237,0.15)":"transparent",color:view===sv?"#A78BFA":C.textSecondary,fontSize:12,fontWeight:view===sv?600:400,textAlign:"left"}}>
                      {emr}<span style={{marginLeft:"auto",fontSize:11,color:C.textMuted}}>{cnt}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
          {navBtn("genit","GenIT","&#128187;",itCount,view==="genit")}
          <div style={{height:1,background:C.border,margin:"12px 0"}}/>
          {navBtn("icps","ICPs","&#127919;",undefined,view==="icps")}
          {navBtn("bench","Bench Gaps","&#128202;",undefined,view==="bench")}
          {navBtn("settings","Settings","&#9881;",undefined,view==="settings")}
        </nav>
        <div style={{padding:"16px 12px",borderTop:`1px solid ${C.border}`}}>
          <button onClick={signOut} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,border:"none",background:"transparent",color:C.textMuted,fontSize:12,cursor:"pointer"}}>Sign Out</button>
        </div>
      </div>

      <div style={{marginLeft:230,flex:1,padding:32,maxWidth:"calc(100vw - 230px)",overflowX:"hidden"}}>
        {dbError&&<div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:10,padding:16,marginBottom:24}}><div style={{fontWeight:600,color:C.warning,marginBottom:6}}>Database setup needed</div><div style={{fontSize:13,color:C.textSecondary}}>Run supabase-setup.sql in Supabase Dashboard - SQL Editor.</div></div>}

        {bulkUpload&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:"100%",maxWidth:540}}>
              <h2 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Bulk Upload</h2>
              <p style={{fontSize:13,color:C.textSecondary,marginBottom:20}}>{bulkUpload.running?`Processing ${bulkUpload.current} of ${bulkUpload.total}...`:`Complete - ${bulkUpload.done.length} imported, ${bulkUpload.merged.length} merged, ${bulkUpload.errors.length} failed`}</p>
              {bulkUpload.running&&<div style={{marginBottom:20}}><div style={{background:C.surface,borderRadius:8,height:8,marginBottom:8,overflow:"hidden"}}><div style={{width:`${(bulkUpload.current/bulkUpload.total)*100}%`,height:"100%",background:C.accent,borderRadius:8,transition:"width 0.3s"}}/></div><div style={{fontSize:12,color:C.textMuted}}>{bulkUpload.currentName}</div></div>}
              {bulkUpload.done.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Imported ({bulkUpload.done.length})</div><div style={{maxHeight:120,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>{bulkUpload.done.map((d,i)=><div key={i} style={{fontSize:12,color:C.success,background:"rgba(34,197,94,0.08)",padding:"3px 10px",borderRadius:6}}>{d.candidate} - {d.name}</div>)}</div></div>}
              {bulkUpload.merged.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Merged ({bulkUpload.merged.length})</div><div style={{maxHeight:100,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>{bulkUpload.merged.map((d,i)=><div key={i} style={{fontSize:12,color:C.warning,background:"rgba(245,158,11,0.08)",padding:"3px 10px",borderRadius:6}}>{d.candidate} - {d.name}</div>)}</div></div>}
              {bulkUpload.errors.length>0&&<div style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Failed ({bulkUpload.errors.length})</div><div style={{maxHeight:80,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>{bulkUpload.errors.map((d,i)=><div key={i} style={{fontSize:12,color:C.danger,background:"rgba(239,68,68,0.08)",padding:"3px 10px",borderRadius:6}}>{d.name}</div>)}</div></div>}
              {!bulkUpload.running&&<Btn onClick={()=>setBulkUpload(null)}>Done</Btn>}
            </div>
          </div>
        )}

        {modal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 20px",overflowY:"auto"}}>
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:"100%",maxWidth:720}}>
              {modal==="add_candidate"&&<CandidateForm onSave={saveCandidate} onCancel={()=>setModal(null)}/>}
              {modal==="edit_candidate"&&<CandidateForm candidate={selected} onSave={saveCandidate} onCancel={()=>setModal(null)}/>}
              {modal==="add_icp"&&<ICPForm onSave={saveICP} onCancel={()=>setModal(null)}/>}
              {modal==="edit_icp"&&<ICPForm icp={selected} onSave={saveICP} onCancel={()=>setModal(null)}/>}
              {modal==="detail"&&<CandidateDetail candidate={selected} icps={icps} onEdit={()=>setModal("edit_candidate")} onClose={()=>setModal(null)} onDelete={()=>deleteCandidate(selected.id)}/>}
            </div>
          </div>
        )}

        {isCandView&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <div><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{getTitle()}</h1><p style={{color:C.textSecondary,fontSize:13}}>{filtered.length} candidate{filtered.length!==1?"s":""}</p></div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <label style={{cursor:"pointer"}}>
                  <span style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,color:C.textPrimary,cursor:"pointer",display:"inline-block"}}>Bulk Upload</span>
                  <input type="file" multiple accept=".pdf,.docx,.txt" onChange={handleBulkUpload} style={{display:"none"}}/>
                </label>
                <Btn onClick={()=>{setSelected(null);setModal("add_candidate");}}>+ Add Candidate</Btn>
              </div>
            </div>
            <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, title, EMR, location..." style={{flex:1,minWidth:200,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}/>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}>
                <option value="all">All Statuses</option><option value="active">Active</option><option value="passive">Passive</option><option value="placed">Placed</option>
              </select>
              {icps.length>0&&<select value={matchICP} onChange={e=>setMatchICP(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.textPrimary,fontSize:13,outline:"none"}}><option value="">Sort by ICP match...</option>{icps.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select>}
            </div>
            <CandidateTable candidates={filtered} icps={icps} matchICP={matchICP} onSelect={c=>{setSelected(c);setModal("detail");}}/>
          </div>
        )}

        {view==="icps"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <div><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Ideal Candidate Profiles</h1><p style={{color:C.textSecondary,fontSize:13}}>Define what great looks like for each role or EMR</p></div>
              <Btn onClick={()=>{setSelected(null);setModal("add_icp");}}>+ New ICP</Btn>
            </div>
            {icps.length===0?(
              <div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted}}>
                <div style={{fontSize:40,marginBottom:16}}>&#127919;</div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:8,color:C.textSecondary}}>No ICPs yet</div>
                <div style={{fontSize:13,marginBottom:20}}>Create an ICP for each EMR you staff for</div>
                <Btn onClick={()=>setModal("add_icp")}>+ New ICP</Btn>
              </div>
            ):(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))",gap:16}}>
                {icps.map(icp=>{
                  const mc=candidates.filter(c=>{const s=scoreCandidate(c,icp);return s!==null&&s>=60;}).length;
                  return (
                    <div key={icp.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
                        <div><div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{icp.name}</div><Badge color={icp.icp_type==="emr"?"emr":"it"}>{icp.icp_type==="emr"?"EMR Project":"IT / Leadership"}</Badge></div>
                        <div style={{display:"flex",gap:6}}><Btn variant="ghost" size="sm" onClick={()=>{setSelected(icp);setModal("edit_icp");}}>Edit</Btn><Btn variant="danger" size="sm" onClick={()=>deleteICP(icp.id)}>X</Btn></div>
                      </div>
                      {icp.required_emr_systems?.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>Required EMRs</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{icp.required_emr_systems.map(e=><Badge key={e} color="emr" size="sm">{e}</Badge>)}</div></div>}
                      {icp.required_skills?.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>Required Skills</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{icp.required_skills.map(s=><Badge key={s} color="accent" size="sm">{s}</Badge>)}</div></div>}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                        <span style={{fontSize:12,color:C.textSecondary}}>{icp.min_years_experience?`${icp.min_years_experience}+ yrs`:"Any exp"} - {icp.travel_required?"Travel req.":"No travel req."}</span>
                        <Badge color={mc>3?"success":mc>0?"warning":"danger"}>{mc} match{mc!==1?"es":""}</Badge>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {view==="bench"&&(
          <div>
            <div style={{marginBottom:24}}><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Bench Gaps</h1><p style={{color:C.textSecondary,fontSize:13}}>Where you are thin on available candidates by EMR system</p></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:12,marginBottom:32}}>
              {benchGaps.map(({emr,available,total})=>(
                <div key={emr} style={{background:C.surface,border:`1px solid ${available===0?"rgba(239,68,68,0.3)":available<=1?"rgba(245,158,11,0.3)":C.border}`,borderRadius:12,padding:18}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontWeight:700,fontSize:14}}>{emr}</span>
                    <Badge color={available===0?"danger":available<=1?"warning":"success"}>{available===0?"Gap":available<=1?"Thin":"OK"}</Badge>
                  </div>
                  <div style={{fontSize:28,fontWeight:700,fontFamily:"monospace",color:available===0?C.danger:available<=1?C.warning:C.success}}>{available}</div>
                  <div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{available} available - {total} total</div>
                  <div style={{marginTop:12,background:C.bg,borderRadius:6,height:4,overflow:"hidden"}}>
                    <div style={{width:total>0?`${(available/Math.max(total,5))*100}%`:"0%",height:"100%",background:available===0?C.danger:available<=1?C.warning:C.success,borderRadius:6}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>IT / Leadership Bench</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:16}}>
                {[{label:"Total IT/Leadership",value:candidates.filter(c=>c.candidate_type==="it_leadership").length},{label:"Active / Looking",value:candidates.filter(c=>c.candidate_type==="it_leadership"&&c.active_status==="active").length},{label:"Passive / Open",value:candidates.filter(c=>c.candidate_type==="it_leadership"&&c.active_status==="passive").length}].map(stat=>(
                  <div key={stat.label} style={{textAlign:"center"}}>
                    <div style={{fontSize:32,fontWeight:700,fontFamily:"monospace",color:C.accent}}>{stat.value}</div>
                    <div style={{fontSize:12,color:C.textSecondary,marginTop:4}}>{stat.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {view==="settings"&&<SettingsView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
